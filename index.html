
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Reflections</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>My Reflections</h1>
        </header>

        <main>
            <!-- Form for new entries -->
            <div class="entry-form">
                <input type="text" id="entryTitle" placeholder="Entry title...">
                <textarea id="entryContent" placeholder="Write your thoughts..."></textarea>
                <button onclick="saveEntry()">Save Entry</button>
            </div>

            <!-- Display entries -->
            <div>
                <h2>My Entries</h2>
                <input type="text" id="searchBox" placeholder="Search..." onkeyup="searchEntries()">
                <div id="entriesList"></div>
            </div>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
